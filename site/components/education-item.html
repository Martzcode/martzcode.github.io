<div class="p-8 rounded-[20px] bg-bg-card backdrop-blur-md border border-border-color transition-all duration-300"
    data-reveal>
    <div class="flex flex-col items-center gap-4 mb-4 text-center">
        <img src="{{logoUrl}}" alt="{{logoAlt}}"
            class="{{logoClass}} h-[60px] w-auto transition-transform hover:scale-105">
        <h3 class="text-xl font-bold text-primary uppercase">{{schoolName}}</h3>
    </div>
    <div class="text-center font-bold text-secondary mb-4">{{period}}</div>
    <p class="text-center text-text-dim">{{degree}}</p>
</div>
